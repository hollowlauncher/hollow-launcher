<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow Launcher</title>
  <link rel="icon" type="image/png" href="https://github.com/hollowlauncher/hollow-launcher/blob/main/20260322_213749.png?raw=true">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Material Symbols Rounded filled -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0&display=swap" rel="stylesheet">
  <!-- Plus Jakarta Sans \u2013 closest Google Font to SF Pro feel -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050505;
      --surface: rgba(255,255,255,0.04);
      --surface-solid: #111;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f2f2f2;
      --muted: #5a5a5a;
      --muted2: #888;
      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Background image \u2014 only visible in hero */
    .bg-img {
      position: fixed;
      inset: 0;
      background: url('https://cdn.modrinth.com/data/lLqFfGNs/images/a7205115d731077733ab5cdcc639e5531f2dee12.jpeg') center/cover no-repeat;
      opacity: var(--bg-opacity, 0.14);
      z-index: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    /* \u2500\u2500\u2500 HEADER \u2500\u2500\u2500 */
    header {
      position: fixed;
      inset: 0 0 auto 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(5,5,5,0.78);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      z-index: 999;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .logo img {
      width: 26px; height: 26px;
      border-radius: 7px;
    }
    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.025em;
    }

    nav {
      display: flex;
      gap: 2px;
    }
    nav a {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted2);
      text-decoration: none;
      padding: 5px 9px;
      border-radius: 7px;
      transition: color .18s, background .18s;
      letter-spacing: -0.01em;
    }
    nav a:hover { color: var(--text); background: rgba(255,255,255,0.07); }

    .header-right { display: flex; align-items: center; gap: 2px; }
    .vr { width:1px; height:16px; background:var(--border); margin:0 6px; }

    .icon-btn {
      width: 30px; height: 30px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted2);
      text-decoration: none;
      transition: background .18s, color .18s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .icon-btn svg { width:15px; height:15px; fill:currentColor; }

    @media (max-width: 500px) {
      nav { display: none; }
      .vr { display: none; }
    }

    /* \u2500\u2500\u2500 PAGE \u2500\u2500\u2500 */
    .page { position: relative; z-index: 1; }

    /* \u2500\u2500\u2500 HERO \u2500\u2500\u2500 */
    .hero {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 72px 24px 64px;
    }

    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 11px 4px 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted2);
      letter-spacing: -0.01em;
      margin-bottom: 24px;
      animation: fadeUp .5s ease both;
    }
    .hero-pill .ms { font-size: 14px; color: #34d399; }

    .hero h1 {
      font-size: clamp(38px, 9vw, 72px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.0;
      color: #fff;
      animation: fadeUp .5s .08s ease both;
    }

    .hero-sub {
      margin-top: 12px;
      font-size: clamp(14px, 3.5vw, 17px);
      font-weight: 400;
      color: var(--muted2);
      letter-spacing: -0.01em;
      line-height: 1.55;
      animation: fadeUp .5s .16s ease both;
    }

    /* Hero download buttons row */
    .hero-btns {
      display: flex;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp .5s .24s ease both;
    }

    /* \u2500\u2500\u2500 BUTTONS \u2500\u2500\u2500 */
    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 22px;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-decoration: none;
      cursor: pointer;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      -webkit-tap-highlight-color: transparent;
      border: none;
      outline: none;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }

    .btn-white {
      background: #fff;
      color: #000;
      box-shadow: 0 2px 12px rgba(255,255,255,.1);
    }
    .btn-white:hover { box-shadow: 0 8px 24px rgba(255,255,255,.15); background: #ececec; }

    .btn-ghost {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: var(--border-hover); }

    .btn .ms { font-size: 18px; }

    /* Ripple */
    .btn .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple-a .5s linear;
      pointer-events: none;
    }
    .btn-white .ripple { background: rgba(0,0,0,.12); }
    .btn-ghost .ripple { background: rgba(255,255,255,.12); }

    @keyframes ripple-a { to { transform: scale(4); opacity: 0; } }

    /* Download states */
    .btn.is-loading { pointer-events: none; opacity: .8; }
    .btn.is-done {
      pointer-events: none;
      background: #0d2e1a !important;
      color: #4ade80 !important;
      border-color: #1a4d2e !important;
      box-shadow: none !important;
    }
    .btn.is-loading .ms { animation: dl-bounce .6s ease infinite alternate; }
    @keyframes dl-bounce { from { transform: translateY(0); } to { transform: translateY(3px); } }

    /* \u2500\u2500\u2500 SECTION \u2500\u2500\u2500 */
    .section {
      padding: 80px 24px;
      max-width: 960px;
      margin: 0 auto;
      scroll-margin-top: 68px;
    }

    .eyebrow {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .section-title {
      text-align: center;
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 36px;
    }

    /* \u2500\u2500\u2500 FEATURES GRID \u2500\u2500\u2500 */
    .feat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    @media (max-width: 560px) {
      .feat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    }
    @media (max-width: 340px) {
      .feat-grid { grid-template-columns: 1fr; }
    }

    .feat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      transition: border-color .2s, background .2s, transform .2s;
    }
    .feat-card:hover {
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.06);
      transform: translateY(-2px);
    }
    .feat-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.06);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .feat-icon .ms { font-size: 20px; color: var(--text); }
    .feat-name {
      font-size: 13.5px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .feat-desc {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted2);
      line-height: 1.5;
    }

    /* \u2500\u2500\u2500 PREVIEW \u2500\u2500\u2500 */
    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 560px) {
      .preview-grid { grid-template-columns: 1fr; gap: 10px; }
    }

    .preview-card {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #0a0a0a;
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
    }
    .preview-card img {
      width: 100%;
      display: block;
      transition: transform .4s ease;
    }
    .preview-card:hover img { transform: scale(1.02); }

    .preview-caption {
      padding: 10px 14px;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: -0.01em;
      border-top: 1px solid var(--border);
    }

    /* \u2500\u2500\u2500 DOWNLOAD BOX \u2500\u2500\u2500 */
    .dl-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 44px 24px;
      text-align: center;
    }
    .dl-box p {
      font-size: 15px;
      font-weight: 400;
      color: var(--muted2);
      letter-spacing: -0.01em;
    }
    .dl-version {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      margin-bottom: 24px;
    }
    .dl-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* \u2500\u2500\u2500 FOOTER \u2500\u2500\u2500 */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 12.5px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: -0.01em;
      position: relative;
      z-index: 1;
    }

    /* \u2500\u2500\u2500 MATERIAL SYMBOLS \u2500\u2500\u2500 */
    .ms {
      font-family: 'Material Symbols Rounded';
      font-weight: normal;
      font-style: normal;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      user-select: none;
      vertical-align: middle;
    }

    /* \u2500\u2500\u2500 ANIMATIONS \u2500\u2500\u2500 */
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .js-ready .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .5s ease, transform .5s ease;
    }
    .js-ready .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 99px; }
  </style>
</head>
