<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hollow Launcher</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #0f0f0f;
      color: #ffffff;
      line-height: 1.6;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 60px;
      margin-bottom: 20px;
      font-size: 28px;
    }

    p {
      opacity: 0.8;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: 0.2s;
    }

    .btn:hover {
      background: #dcdcdc;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #181818;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
    }

    .preview {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
    }

    footer {
      margin-top: 80px;
      opacity: 0.5;
      text-align: center;
    }
  </style>

</head>

<body>

  <div class="container">

```
<!-- HERO -->
<h1>Hollow Launcher</h1>
<p>Minimal, fast Minecraft launcher for Vanilla & Fabric.</p>

<a href="https://github.com/yourusername/hollow-launcher/releases/latest" class="btn">
  Download for Windows
</a>

<!-- FEATURES -->
<h2>Features</h2>
<div class="features">
  <div class="card">⚡ Fast & lightweight</div>
  <div class="card">🧩 Fabric support</div>
  <div class="card">🎮 Vanilla ready</div>
  <div class="card">🖥 Clean UI (no blur, no glass)</div>
</div>

<!-- PREVIEW -->
<h2>Preview</h2>
<img src="https://via.placeholder.com/900x450" class="preview" alt="Launcher Preview">

<!-- FOOTER -->
<footer>
  © 2026 Hollow Launcher • Built by You
</footer>
```

  </div>

</body>
</html>
