<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hollow Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{color:#fff;background:#000;}

/* Background */
body::before{
content:"";
position:fixed;
inset:0;
background:url('https://cdn.modrinth.com/data/lLqFfGNs/images/a7205115d731077733ab5cdcc639e5531f2dee12.jpeg') center/cover no-repeat;
opacity:0.25;
z-index:-1;
}

/* Header */
header{
display:flex;justify-content:space-between;align-items:center;
padding:0 40px;height:64px;position:fixed;width:100%;
background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);z-index:1000;
}

/* Layout */
.container{max-width:1100px;margin:auto;padding:100px 20px;}
.section{margin-top:100px;text-align:center;}
h1{font-size:64px;}
h2{margin-bottom:30px;}

/* Buttons */
.btn{
display:inline-block;margin-top:20px;padding:14px 28px;
background:#fff;color:#000;border-radius:8px;
text-decoration:none;font-weight:bold;
transition:0.2s;
}
.btn:hover{transform:scale(1.05);}

/* Cards */
.features{
display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:#111;padding:20px;border-radius:12px;border:1px solid #222;
}

/* Preview */
.preview{width:100%;max-width:800px;border-radius:12px;}
.preview-container{display:flex;justify-content:center;}

/* 📱 PHONE INSTALL ANIMATION */
.phone{
width:260px;
height:520px;
background:#111;
border-radius:30px;
padding:20px;
margin:auto;
border:2px solid #333;
box-shadow:0 20px 40px rgba(0,0,0,0.8);
position:relative;
overflow:hidden;
}

.screen{
background:#000;
width:100%;
height:100%;
border-radius:20px;
padding:20px;
text-align:center;
}

.app-icon{
width:80px;height:80px;margin:20px auto;
background:url('https://github.com/hollowlauncher/hollow-launcher/blob/main/20260322_213749.png?raw=true') center/cover;
border-radius:20px;
}

.install-text{margin-top:10px;font-size:18px;}

.progress-bar{
width:100%;
height:6px;
background:#222;
border-radius:10px;
margin-top:30px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#4caf50;
animation:installAnim 4s infinite;
}

@keyframes installAnim{
0%{width:0%;}
50%{width:80%;}
100%{width:100%;}
}

.install-done{
margin-top:20px;
opacity:0;
animation:fadeIn 4s infinite;
}

@keyframes fadeIn{
0%,70%{opacity:0;}
100%{opacity:1;}
}

/* Footer */
footer{text-align:center;margin-top:100px;color:#666;}
</style>
</head>

<body>

<header>
<h3>Hollow Launcher</h3>
</header>

<div class="container">

<!-- HERO -->
<section class="section">
<h1>Hollow Launcher</h1>
<p>Minimal. Fast. Minecraft Launcher</p>

<a href="https://github.com/hollowlauncher/hollow-launcher/releases/download/beta_1.2/HollowLauncher_1.0.0_x64-setup.exe" class="btn">
Download for Windows
</a>

<a id="androidBtn" href="https://your-hyper-launcher.apk" class="btn" style="display:none;">
Download Hyper Launcher
</a>
</section>

<!-- FEATURES -->
<section class="section">
<h2>Features</h2>
<div class="features">
<div class="card">⚡ Ultra fast</div>
<div class="card">🧩 Fabric support</div>
<div class="card">🎮 Vanilla ready</div>
<div class="card">🖥 Clean UI</div>
</div>
</section>

<!-- PREVIEW -->
<section class="section">
<h2>Launcher Preview</h2>
<div class="preview-container">
<img src="https://github.com/hollowlauncher/hollow-launcher/blob/main/Screenshot%202026-03-23%20211706.png?raw=true" class="preview">
</div>
</section>

<!-- 📱 HYPER LAUNCHER SECTION -->
<section class="section">
<h2>Hyper Launcher (Android)</h2>

<div class="phone">
  <div class="screen">
    <div class="app-icon"></div>
    <div class="install-text">Installing...</div>

    <div class="progress-bar">
      <div class="progress"></div>
    </div>

    <div class="install-done">✔ Installed</div>
  </div>
</div>

<br>
<a href="https://your-hyper-launcher.apk" class="btn">
Download APK
</a>

</section>

<footer>
© 2026 Hollow Launcher
</footer>

</div>

<script>
// Android detection
if (/Android/i.test(navigator.userAgent)) {
document.getElementById("androidBtn").style.display = "inline-block";
}
</script>

</body>
</html>
